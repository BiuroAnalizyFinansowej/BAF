<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podstawowy Szablon Maila - BAF</title>
    <link rel="icon" type="image/png" href="baf_logo_p.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --baf-dark: #002d5a;
            --baf-light: #17a2b8;
            --bg-color: #f4f7f9;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            font-family: 'Lato', Arial, sans-serif; 
            color: #333; 
        }
        
        /* Nowy ukЕӮad kontenera (rozszerzony i responsywny) */
        .app-container {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* --- LEWY PANEL: EDYTOR --- */
        #admin-panel {
            background: #ffffff; 
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05); 
            display: flex; 
            flex-direction: column;
            height: calc(100vh - 40px);
            position: sticky;
            top: 20px;
            overflow-y: auto;
        }

        /* Nawigacja w panelu bocznym */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 10px; }
        .nav-btn { 
            text-decoration: none; color: var(--baf-dark); font-weight: bold; border: 2px solid var(--baf-dark); 
            padding: 8px 12px; border-radius: 8px; transition: all 0.3s ease; display: flex; 
            align-items: center; justify-content: center; gap: 6px; font-size: 13px; 
            background-color: transparent; cursor: pointer; flex: 1; font-family: 'Lato', sans-serif;
        }
        .nav-btn:hover { 
            background-color: var(--baf-dark); 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 45, 90, 0.2);
        }
        .nav-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #777; margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"], select { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; 
            font-family: 'Lato', sans-serif; font-size: 14px; box-sizing: border-box; background-color: #fdfdfd;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: var(--baf-light); }
        
        /* Edytor a'la Gmail */
        .editor-container { 
            border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: white; 
            display: flex; flex-direction: column; position: relative; flex-grow: 1; margin-bottom: 15px;
        }
        
        #editor {
            width: 100%; min-height: 200px; flex-grow: 1; padding: 15px; box-sizing: border-box; 
            outline: none; font-size: 14px; line-height: 1.5; overflow-y: auto; color: #222;
            font-family: 'Lato', 'Noto Color Emoji', sans-serif; 
        }
        
        .gmail-toolbar { 
            display: flex; align-items: center; gap: 4px; padding: 8px; 
            background: #f8f9fa; border-top: 1px solid #eee; flex-wrap: wrap; 
        }
        .gmail-toolbar > button, .dropdown-toggle {
            background: none; border: none; border-radius: 4px; cursor: pointer;
            padding: 6px 10px; font-family: "Times New Roman", Times, serif; font-size: 15px;
            color: #444; transition: background 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .gmail-toolbar > button:hover, .dropdown-toggle:hover { background: #e2e6ea; color: var(--baf-dark); }
        .gmail-toolbar .tool-bold { font-weight: bold; }
        .gmail-toolbar .tool-italic { font-style: italic; }
        .gmail-toolbar .tool-underline { text-decoration: underline; }

        /* Przycisk dodawania ramki */
        .btn-add-container {
            font-family: 'Lato', sans-serif !important;
            font-size: 13px !important;
            font-weight: bold !important;
            background-color: #e9ecef !important;
            color: var(--baf-dark) !important;
            margin-left: auto;
        }
        .btn-add-container:hover {
            background-color: var(--baf-light) !important;
            color: white !important;
        }

        /* Menu pop-up dla kolorГіw i emotikonГіw */
        .dropdown-container { position: relative; }
        .dropdown-menu {
            display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            margin-bottom: 10px; background: white; border: 1px solid #ccc; box-shadow: 0 4px 25px rgba(0,0,0,0.15);
            border-radius: 8px; z-index: 9999; padding: 12px; width: max-content;
        }
        .dropdown-menu::after {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            border-width: 7px; border-style: solid; border-color: white transparent transparent transparent;
        }
        .dropdown-menu::before {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); margin-top: 1px;
            border-width: 8px; border-style: solid; border-color: #ccc transparent transparent transparent; z-index: -1;
        }
        .dropdown-menu.active { display: block; }

        /* Siatka kolorГіw */
        .color-grid { display: grid; grid-template-columns: repeat(7, 26px); gap: 6px; margin-bottom: 12px; }
        .color-swatch { width: 26px; height: 26px; border: 1px solid #eee; border-radius: 4px; cursor: pointer; transition: transform 0.1s; }
        .color-swatch:hover { transform: scale(1.15); border-color: #999; z-index: 2; position: relative; }
        .custom-color-wrapper { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555; border-top: 1px solid #eee; padding-top: 8px; }
        .custom-color-wrapper input[type="color"] { width: 24px; height: 24px; padding: 0; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; background: none; }

        /* Siatka emotikonГіw */
        .emoji-grid { 
            display: grid; grid-template-columns: repeat(7, 32px); gap: 4px; 
            max-height: 220px; overflow-y: auto; padding-right: 5px; 
            font-family: 'Noto Color Emoji', sans-serif; 
        }
        .emoji-item { 
            cursor: pointer; font-size: 20px; width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; border-radius: 4px; 
            transition: background 0.1s;
        }
        .emoji-item:hover { background: #e9ecef; }
        
        .emoji-grid::-webkit-scrollbar { width: 6px; }
        .emoji-grid::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .emoji-grid::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .emoji-grid::-webkit-scrollbar-thumb:hover { background: #aaa; }

        .btn-copy {
            background-color: var(--baf-light); color: white; border: none; padding: 15px;
            width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; 
            margin-top: auto; transition: 0.3s; font-size: 14px; font-family: 'Lato', sans-serif;
            box-shadow: 0 4px 15px rgba(23, 162, 184, 0.3);
        }
        .btn-copy:hover { 
            background-color: #138496; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(23, 162, 184, 0.4);
        }
        .btn-copy.success { background-color: #28a745; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }

        /* --- PRAWY PANEL: PODGLД„D --- */
        #email-preview { 
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        #copy-container {
            width: 100%;
            max-width: 650px;
        }

        /* ResponsywnoЕӣДҮ */
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr;
                height: auto;
            }
            #admin-panel {
                position: relative;
                height: auto;
            }
            #email-preview {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<script>
    // --- MECHANIZM ZAZNACZANIA TEKSTU ---
    let savedSelection = null;
    const editorEl = document.getElementById('editor');

    function saveSelection() {
        const sel = window.getSelection();
        if (sel.getRangeAt && sel.rangeCount > 0) {
            savedSelection = sel.getRangeAt(0);
        }
    }

    function restoreSelection() {
        if (savedSelection) {
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedSelection);
        }
    }

    // Zapisuj zaznaczenie, gdy uЕјytkownik pisze lub puszcza myszkДҷ w edytorze
    editorEl.addEventListener('mouseup', saveSelection);
    editorEl.addEventListener('keyup', saveSelection);
    editorEl.addEventListener('mouseleave', saveSelection);

    // --- GENEROWANIE KOLORГ“W ---
    const colors = [
        '#000000', '#434343', '#666666', '#999999', '#cccccc', '#efefef', '#f3f3f3',
        '#cc0000', '#e69138', '#f1c232', '#6aa84f', '#45818e', '#3d85c6', '#674ea7',
        '#ff0000', '#ff9900', '#ffff00', '#00ff00', '#00ffff', '#0000ff', '#9900ff',
        '#f4cccc', '#fce5cd', '#fff2cc', '#d9ead3', '#d0e0e3', '#cfe2f3', '#ead1dc'
    ];
    const colorGrid = document.getElementById('color-grid');
    colors.forEach(color => {
        const div = document.createElement('div');
        div.className = 'color-swatch';
        div.style.backgroundColor = color;
        // preventDefault zapobiega utracie focusu!
        div.onmousedown = (e) => e.preventDefault();
        div.onclick = () => {
            execCmd('foreColor', color);
            toggleMenu('color-menu'); 
        };
        colorGrid.appendChild(div);
    });

    // --- GENEROWANIE EMOTIKONГ“W ---
    const emojis = [
        'рҹҳҖ','рҹҳҒ','рҹҳӮ','рҹӨЈ','рҹҳғ','рҹҳ„','рҹҳ…','рҹҳҶ','рҹҳү','рҹҳҠ','рҹҳӢ','рҹҳҺ','рҹҳҚ','рҹҳҳ','рҹҘ°','рҹҳ—','рҹҳҷ','рҹҳҡ','вҳәпёҸ','рҹҷӮ','рҹӨ—','рҹӨ©',
        'рҹӨ”','рҹӨЁ','рҹҳҗ','рҹҳ‘','рҹҳ¶','рҹҷ„','рҹҳҸ','рҹҳЈ','рҹҳҘ','рҹҳ®','рҹӨҗ','рҹҳҜ','рҹҳӘ','рҹҳ«','рҹҳҙ','рҹҳҢ','рҹҳӣ','рҹҳң','рҹҳқ','рҹӨӨ','рҹҳ’','рҹҳ“',
        'рҹҳ”','рҹҳ•','рҹҷғ','рҹӨ‘','рҹҳІ','вҳ№пёҸ','рҹҷҒ','рҹҳ–','рҹҳһ','рҹҳҹ','рҹҳӨ','рҹҳў','рҹҳӯ','рҹҳҰ','рҹҳ§','рҹҳЁ','рҹҳ©','рҹӨҜ','рҹҳ¬','рҹҳ°','рҹҳұ','рҹҘө',
        'рҹҘ¶','рҹҳі','рҹӨӘ','рҹҳө','рҹҳЎ','рҹҳ ','рҹӨ¬','рҹҳ·','рҹӨ’','рҹӨ•','рҹӨў','рҹӨ®','рҹӨ§','рҹҳҮ','рҹӨ ','рҹӨЎ','рҹӨҘ','рҹӨ«','рҹӨӯ','рҹ§җ','рҹӨ“',
        'рҹӨІ','рҹ‘җ','рҹҷҢ','рҹ‘Ҹ','рҹӨқ','рҹ‘Қ','рҹ‘Һ','рҹ‘Ҡ','вңҠ','рҹӨӣ','рҹӨң','рҹӨһ','вңҢпёҸ','рҹӨҹ','рҹӨҳ','рҹ‘Ң','рҹ‘Ҳ','рҹ‘ү','рҹ‘Ҷ','рҹ‘Ү','вҳқпёҸ','вңӢ',
        'рҹӨҡ','рҹ–җ','рҹ––','рҹ‘Ӣ','рҹӨҷ','рҹ’Ә','рҹ–•','вңҚпёҸ','рҹҷҸ',
        'рҹ”ҙ','рҹҹ ','рҹҹЎ','рҹҹў','рҹ”ө','рҹҹЈ','вҡ«','вҡӘ','рҹҹӨ','рҹҹҘ','рҹҹ§','рҹҹЁ','рҹҹ©','рҹҹҰ','рҹҹӘ','в¬ӣ','в¬ң','рҹҹ«',
        'вқӨпёҸ','рҹ§Ў','рҹ’ӣ','рҹ’ҡ','рҹ’ҷ','рҹ’ң','рҹ–Ө','рҹӨҚ','рҹӨҺ','рҹ’”','вқЈпёҸ','рҹ’•','рҹ’һ','рҹ’“','рҹ’—','рҹ’–','рҹ’ҳ','рҹ’қ',
        'вң…','вқҢ','вқҺ','вһ•','вһ–','вһ—','вқ“','вқ”','вқ•','вқ—','вӯ•',
        'рҹ’ј','рҹ“Ҳ','рҹ“ү','рҹ“Ҡ','рҹ“Ӣ','рҹ“…','рҹ“Ҷ','рҹ“Ү','рҹ“Ғ','рҹ“Ӯ','рҹ“ғ','рҹ“„','рҹ§®','рҹ“Һ','рҹ”—','вңӮпёҸ','рҹ—‘пёҸ','рҹ“Ң','рҹ“Қ',
        'рҹ“һ','вҳҺпёҸ','рҹ“ ','рҹ“§','вңүпёҸ','рҹ“©','рҹ“Ё','рҹ“¬','рҹ“®','рҹҸ ','рҹҸў','рҹҸҰ','рҹ’°','рҹӘҷ','рҹ’ҙ','рҹ’ө','рҹ’¶','рҹ’·','рҹ’ё','рҹ’і','рҹ§ҫ',
        'рҹҡҖ','рҹ”Ҙ','вӯҗ','рҹ’Ў','рҹ””','рҹ’Ҝ'
    ];
    const emojiGrid = document.getElementById('emoji-grid');
    emojis.forEach(emoji => {
        const span = document.createElement('span');
        span.className = 'emoji-item';
        span.innerText = emoji;
        span.onmousedown = (e) => e.preventDefault();
        span.onclick = () => {
            insertEmoji(emoji);
            toggleMenu('emoji-menu'); 
        };
        emojiGrid.appendChild(span);
    });

    // --- FUNKCJE EDYTORA ---
    function toggleMenu(menuId) {
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
            if (menu.id !== menuId) menu.classList.remove('active');
        });
        document.getElementById(menuId).classList.toggle('active');
    }

    document.addEventListener('mousedown', function(event) {
        if (!event.target.closest('.dropdown-container')) {
            document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('active'));
        }
    });

    function execCmd(command, value = null) {
        if (document.activeElement !== editorEl) {
            editorEl.focus();
            restoreSelection();
        }
        // Wymusza poprawne tagi span i style css dla kolorГіw
        document.execCommand("styleWithCSS", false, true); 
        document.execCommand(command, false, value);
        saveSelection();
        updatePreview();
    }

    function insertEmoji(emoji) {
        if (document.activeElement !== editorEl) {
            editorEl.focus();
            restoreSelection();
        }
        document.execCommand('insertText', false, emoji);
        saveSelection();
        updatePreview();
    }

    // Wstawianie specjalnego kontenera (Ramki) dopasowanego pod BAF
    function insertContainer() {
        if (document.activeElement !== editorEl) {
            editorEl.focus();
            restoreSelection();
        }
        
        // Kod HTML ramki (Dopasowany kolorystycznie pod BAF - np. niebieski pasek boczny i jasne tЕӮo)
        const containerHtml = `
            <br>
            <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f0f7f9; border-left: 4px solid #17a2b8; border-radius: 0 6px 6px 0; margin-bottom: 20px; margin-top: 10px;">
                <tr>
                    <td style="padding: 18px 20px;">
                        <p style="margin: 0; font-family: 'Lato', Arial, sans-serif; color: #002d5a;"><em>Wpisz treЕӣДҮ wyrГіЕјnionД…...</em></p>
                    </td>
                </tr>
            </table>
            <br>
        `;
        
        document.execCommand('insertHTML', false, containerHtml);
        saveSelection();
        updatePreview();
    }

    function updatePreview() {
        const name = document.getElementById('input-name').value;
        const content = editorEl.innerHTML;
        const advisorData = document.getElementById('input-advisor').value.split('|');
        const showSig = document.getElementById('show-signature').checked;

        document.getElementById('view-name').textContent = name + (name.endsWith(',') ? '' : ',');
        document.getElementById('view-content').innerHTML = content;
        document.getElementById('view-link').href = advisorData[1];
        document.getElementById('view-signature-container').style.display = showSig ? 'block' : 'none';
    }

    function copyEmail() {
        const container = document.getElementById('copy-container');
        const btn = document.getElementById('copy-btn');
        
        const range = document.createRange();
        range.selectNode(container);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);

        try {
            const blob = new Blob([container.innerHTML], { type: 'text/html' });
            const item = new ClipboardItem({ 'text/html': blob });
            navigator.clipboard.write([item]).then(() => {
                btn.textContent = 'вң… SKOPIOWANO!';
                btn.classList.add('success');
                setTimeout(() => {
                    btn.textContent = 'KOPIUJ TREЕҡДҶ DO MAILA';
                    btn.classList.remove('success');
                }, 2000);
            });
        } catch (err) {
            document.execCommand('copy');
            btn.textContent = 'вң… SKOPIOWANO!';
            btn.classList.add('success');
            setTimeout(() => {
                btn.textContent = 'KOPIUJ TREЕҡДҶ DO MAILA';
                btn.classList.remove('success');
            }, 2000);
        }
        window.getSelection().removeAllRanges();
    }

    // Inicjalizacja podglД…du przy zaЕӮadowaniu strony
    updatePreview();
</script>

</body>
