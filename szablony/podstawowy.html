<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podstawowy Szablon Maila - BAF</title>
    <link rel="icon" type="image/png" href="baf_logo_p.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --baf-dark: #002d5a;
            --baf-light: #17a2b8;
            --bg-color: #f4f7f9;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            font-family: 'Lato', Arial, sans-serif; 
            color: #333; 
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* --- LEWY PANEL: EDYTOR --- */
        #admin-panel {
            background: #ffffff; 
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05); 
            display: flex; 
            flex-direction: column;
            height: calc(100vh - 40px);
            position: sticky;
            top: 20px;
            overflow-y: auto;
        }

        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 10px; }
        .nav-btn { 
            text-decoration: none; color: var(--baf-dark); font-weight: bold; border: 2px solid var(--baf-dark); 
            padding: 8px 12px; border-radius: 8px; transition: all 0.3s ease; display: flex; 
            align-items: center; justify-content: center; gap: 6px; font-size: 13px; 
            background-color: transparent; cursor: pointer; flex: 1; font-family: 'Lato', sans-serif;
        }
        .nav-btn:hover { 
            background-color: var(--baf-dark); 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 45, 90, 0.2);
        }
        .nav-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #777; margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"], select { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; 
            font-family: 'Lato', sans-serif; font-size: 14px; box-sizing: border-box; background-color: #fdfdfd;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: var(--baf-light); }
        
        /* Edytor z pływającym paskiem */
        .editor-container { 
            border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: white; 
            display: flex; flex-direction: column; position: relative; flex-grow: 1; margin-bottom: 15px;
        }
        
        /* NOWOŚĆ: Pasek narzędzi stale na górze podczas skrolowania */
        .gmail-toolbar { 
            display: flex; align-items: center; gap: 4px; padding: 8px; 
            background: #f8f9fa !important; border-bottom: 1px solid #eee; flex-wrap: wrap; 
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        
        #editor {
            width: 100%; min-height: 200px; flex-grow: 1; padding: 15px; box-sizing: border-box; 
            outline: none; font-size: 14px; line-height: 1.5; overflow-y: auto; color: #222;
            font-family: 'Lato', 'Noto Color Emoji', sans-serif; 
        }

        .gmail-toolbar > button, .dropdown-toggle {
            background: none; border: none; border-radius: 4px; cursor: pointer;
            padding: 6px 10px; font-family: "Times New Roman", Times, serif; font-size: 15px;
            color: #444; transition: background 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .gmail-toolbar > button:hover, .dropdown-toggle:hover { background: #e2e6ea; color: var(--baf-dark); }
        .gmail-toolbar .tool-bold { font-weight: bold; }
        .gmail-toolbar .tool-italic { font-style: italic; }
        .gmail-toolbar .tool-underline { text-decoration: underline; }

        .btn-add-container {
            margin-left: auto;
        }
        .btn-add-container .dropdown-toggle {
            font-family: 'Lato', sans-serif !important;
            font-size: 13px !important;
            font-weight: bold !important;
            background-color: #e9ecef !important;
            color: var(--baf-dark) !important;
        }
        .btn-add-container .dropdown-toggle:hover {
            background-color: var(--baf-light) !important;
            color: white !important;
        }

        /* Menu pop-up */
        .dropdown-container { position: relative; }
        .dropdown-menu {
            display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            margin-top: 5px; background: white; border: 1px solid #ccc; box-shadow: 0 4px 25px rgba(0,0,0,0.15);
            border-radius: 8px; z-index: 9999; padding: 12px; width: max-content;
        }
        .dropdown-menu.align-right {
            left: auto; right: 0; transform: none;
        }
        .dropdown-menu.active { display: block; }

        /* Siatka kolorów */
        .color-grid { display: grid; grid-template-columns: repeat(7, 26px); gap: 6px; margin-bottom: 12px; }
        .color-swatch { width: 26px; height: 26px; border: 1px solid #eee; border-radius: 4px; cursor: pointer; transition: transform 0.1s; }
        .color-swatch:hover { transform: scale(1.15); border-color: #999; z-index: 2; position: relative; }
        .custom-color-wrapper { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555; border-top: 1px solid #eee; padding-top: 8px; }
        .custom-color-wrapper input[type="color"] { width: 24px; height: 24px; padding: 0; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; background: none; }

        /* Siatka emotikonów */
        .emoji-grid { 
            display: grid; grid-template-columns: repeat(7, 32px); gap: 4px; 
            max-height: 220px; overflow-y: auto; padding-right: 5px; 
            font-family: 'Noto Color Emoji', sans-serif; 
        }
        .emoji-item { 
            cursor: pointer; font-size: 20px; width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; border-radius: 4px; 
            transition: background 0.1s;
        }
        .emoji-item:hover { background: #e9ecef; }
        
        .emoji-grid::-webkit-scrollbar { width: 6px; }
        .emoji-grid::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .emoji-grid::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .emoji-grid::-webkit-scrollbar-thumb:hover { background: #aaa; }

        /* Opcje ramek */
        .frame-option {
            display: block; width: 100%; text-align: left; padding: 8px 12px; margin-bottom: 5px;
            border: none; background: transparent; cursor: pointer; border-radius: 4px;
            font-family: 'Lato', sans-serif; font-size: 13px; font-weight: bold; transition: 0.2s;
        }
        .frame-option:last-child { margin-bottom: 0; }
        .frame-blue { background: #f0f7f9; border-left: 4px solid #17a2b8; color: #002d5a; }
        .frame-blue:hover { background: #e0f0f4; }
        .frame-green { background: #f0f9f1; border-left: 4px solid #28a745; color: #155724; }
        .frame-green:hover { background: #e0eed4; }
        .frame-orange { background: #fff6f0; border-left: 4px solid #fd7e14; color: #854007; }
        .frame-orange:hover { background: #ffe4d1; }

        .btn-copy {
            background-color: var(--baf-light); color: white; border: none; padding: 15px;
            width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; 
            margin-top: auto; transition: 0.3s; font-size: 14px; font-family: 'Lato', sans-serif;
            box-shadow: 0 4px 15px rgba(23, 162, 184, 0.3);
        }
        .btn-copy:hover { 
            background-color: #138496; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(23, 162, 184, 0.4);
        }
        .btn-copy.success { background-color: #28a745; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }

        /* --- PRAWY PANEL: PODGLĄD --- */
        #email-preview { 
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        #copy-container {
            width: 100%;
            max-width: 650px;
        }

        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr;
                height: auto;
            }
            #admin-panel {
                position: relative;
                height: auto;
            }
            #email-preview {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="app-container">

    <div id="admin-panel">
        <div class="top-nav">
            <button onclick="history.back()" class="nav-btn">&laquo; Powrót</button>
            <a href="../index.html" class="nav-btn" title="Strona Główna">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg> Strona Główna
            </a>
        </div>

        <div class="logo-container">
            <img src="baf_logo.png" alt="BAF" width="140">
        </div>

        <div class="control-group">
            <label>Powitanie</label>
            <input type="text" id="input-name" value="Panie Marcinie" oninput="updatePreview()">
        </div>

        <div class="control-group" style="display:flex; flex-direction:column; flex-grow:1;">
            <label>Treść wiadomości</label>
            <div class="editor-container">
                <div class="gmail-toolbar">
                    <button class="tool-bold" onmousedown="event.preventDefault()" onclick="execCmd('bold')" title="Pogrubienie">B</button>
                    <button class="tool-italic" onmousedown="event.preventDefault()" onclick="execCmd('italic')" title="Kursywa">I</button>
                    <button class="tool-underline" onmousedown="event.preventDefault()" onclick="execCmd('underline')" title="Podkreślenie">U</button>
                    
                    <div class="dropdown-container">
                        <button class="dropdown-toggle" onmousedown="event.preventDefault()" onclick="toggleMenu('color-menu')" title="Kolor tekstu">
                            <span style="font-weight:bold; border-bottom: 3px solid #000; padding-bottom: 2px;">A</span> ▼
                        </button>
                        <div id="color-menu" class="dropdown-menu">
                            <div class="color-grid" id="color-grid"></div>
                            <div class="custom-color-wrapper">
                                <span>Własny:</span>
                                <input type="color" id="custom-color-picker" onmousedown="saveSelection()" onchange="execCmd('foreColor', this.value); toggleMenu('color-menu');">
                            </div>
                        </div>
                    </div>

                    <div class="dropdown-container">
                        <button class="dropdown-toggle" onmousedown="event.preventDefault()" onclick="toggleMenu('emoji-menu')" title="Wstaw emotikon">
                            <span style="font-family: 'Noto Color Emoji', sans-serif;">😊</span>
                        </button>
                        <div id="emoji-menu" class="dropdown-menu">
                            <div class="emoji-grid" id="emoji-grid"></div>
                        </div>
                    </div>

                    <button onmousedown="event.preventDefault()" onclick="execCmd('insertUnorderedList')" title="Lista punktowana">≡</button>
                    <button onmousedown="event.preventDefault()" onclick="execCmd('removeFormat')" title="Wyczyść formatowanie">T×</button>

                    <div class="dropdown-container btn-add-container">
                        <button class="dropdown-toggle" onmousedown="event.preventDefault()" onclick="toggleMenu('frame-menu')" title="Wstaw wyróżniony kontener">
                            [+] Ramka ▼
                        </button>
                        <div id="frame-menu" class="dropdown-menu align-right">
                            <button class="frame-option frame-blue" onmousedown="event.preventDefault()" onclick="insertContainer('blue')">Niebieska</button>
                            <button class="frame-option frame-green" onmousedown="event.preventDefault()" onclick="insertContainer('green')">Zielona</button>
                            <button class="frame-option frame-orange" onmousedown="event.preventDefault()" onclick="insertContainer('orange')">Pomarańczowa</button>
                        </div>
                    </div>
                </div>

                <div id="editor" contenteditable="true" oninput="updatePreview()">
                    Dziękuję za rozmowę telefoniczną. W nawiązaniu do naszych ustaleń, przesyłam niezbędne informacje. Proszę o zapoznanie się z poniższymi szczegółami.
                </div>
            </div>
        </div>

        <div class="control-group">
            <label style="display: flex; align-items: center; cursor: pointer; text-transform: none; color: #333;">
                <input type="checkbox" id="show-signature" onchange="updatePreview()" checked style="margin-right: 10px; width: 16px; height: 16px;"> 
                Dołącz przycisk "Moja wizytówka"
            </label>
        </div>

        <div class="control-group">
            <label>Doradca</label>
            <select id="input-advisor" onchange="updatePreview()">
                <option value="Dawid Błachno|https://q-r.to/DawidBlachnoBiuroBAF">Dawid Błachno</option>
                <option value="Weronika Lekston|https://q-r.to/WeronikaLekstonBiuroBAF">Weronika Lekston</option>
                <option value="Mieczysław Andrzejewski|https://l.ead.me/MieczyslawAndrzejewskiBiuroBAF">Mieczysław Andrzejewski</option>
                <option value="Joanna Karpała|https://l.ead.me/JoannaKarpalaBiuroBAF">Joanna Karpała</option>
                <option value="Piotr Pakuła|https://q-r.to/PakulaPiotrBiuroBAF">Piotr Pakuła</option>
                <option value="Wiktoria Nojek|https://q-r.to/WiktoraNojekBiuroBAF">Wiktoria Nojek</option>
                <option value="Wojciech Młynarczyk|https://q-r.to/WojciechMlynarczykBiuroBAF">Wojciech Młynarczyk</option>
                <option value="Maja Zięba|https://q-r.to/MajaZiebaBiuroBAF">Maja Zięba</option>
                <option value="Mateusz Dzidkowski|https://q-r.to/MateuszDzidkowskiBiuroBAF">Mateusz Dzidkowski</option>
            </select>
        </div>

        <button class="btn-copy" id="copy-btn" onclick="copyEmail()">KOPIUJ TREŚĆ DO MAILA</button>
    </div>

    <div id="email-preview">
        <div id="copy-container">
            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f4f7f9; font-family: 'Lato', Arial, sans-serif;">
                <tr>
                    <td align="center" style="padding: 20px;">
                        <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; background-color: #ffffff; border-radius: 8px; border: 1px solid #e1e4e8; overflow: hidden; margin-bottom: 20px;">
                            <tr>
                                <td align="center" style="padding: 30px 0; background-color: #ffffff; border-bottom: 1px solid #f2f2f2;">
                                    <img src="baf_logo.png" alt="BAF" width="200" style="display: block; border: 0;">
                                </td>
                            </tr>
                            <tr>
                                <td style="padding: 40px;">
                                    <h1 id="view-name" style="font-size: 22px; color: #002d5a; margin: 0 0 20px 0; font-weight: 700;">Panie Marcinie,</h1>
                                    
                                    <div id="view-content" style="font-size: 16px; color: #333; line-height: 1.6; margin-bottom: 25px; font-family: 'Lato', 'Noto Color Emoji', Arial, sans-serif;">
                                        </div>

                                    <div id="view-signature-container" align="center" style="margin-top: 35px; padding-top: 25px; border-top: 1px solid #f2f2f2;">
                                        <a id="view-link" href="#" style="display: inline-block; padding: 14px 35px; background-color: #17a2b8; color: #ffffff !important; text-decoration: none; font-weight: bold; border-radius: 5px; font-size: 16px;">Moja wizytówka</a>
                                    </div>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </div>
    </div>

</div>

<script>
    let savedSelection = null;
    const editorEl = document.getElementById('editor');

    function saveSelection() {
        const sel = window.getSelection();
        if (sel.getRangeAt && sel.rangeCount > 0) {
            savedSelection = sel.getRangeAt(0);
        }
    }

    function restoreSelection() {
        if (savedSelection) {
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedSelection);
        }
    }

    editorEl.addEventListener('mouseup', saveSelection);
    editorEl.addEventListener('keyup', saveSelection);
    editorEl.addEventListener('mouseleave', saveSelection);

    const colors = [
        '#000000', '#434343', '#666666', '#999999', '#cccccc', '#efefef', '#f3f3f3',
        '#cc0000', '#e69138', '#f1c232', '#6aa84f', '#45818e', '#3d85c6', '#674ea7',
        '#ff0000', '#ff9900', '#ffff00', '#00ff00', '#00ffff', '#0000ff', '#9900ff',
        '#f4cccc', '#fce5cd', '#fff2cc', '#d9ead3', '#d0e0e3', '#cfe2f3', '#ead1dc'
    ];
    const colorGrid = document.getElementById('color-grid');
    colors.forEach(color => {
        const div = document.createElement('div');
        div.className = 'color-swatch';
        div.style.backgroundColor = color;
        div.onmousedown = (e) => e.preventDefault();
        div.onclick = () => {
            execCmd('foreColor', color);
            toggleMenu('color-menu'); 
        };
        colorGrid.appendChild(div);
    });

    const emojis = [
        '😀','😁','😂','🤣','😃','😄','😅','😆','😉','😊','😋','😎','😍','😘','🥰','😗','😙','😚','☺️','🙂','🤗','🤩',
        '🤔','🤨','😐','😑','😶','🙄','😏','😣','😥','😮','🤐','😯','😪','😫','😴','😌','😛','😜','😝','🤤','😒','😓',
        '😔','😕','🙃','🤑','😲','☹️','🙁','😖','😞','😟','😤','😢','😭','😦','😧','😨','😩','🤯','😬','😰','😱','🥵',
        '🥶','😳','🤪','😵','😡','😠','🤬','😷','🤒','🤕','🤢','🤮','🤧','😇','🤠','🤡','🤥','🤫','🤭','🧐','🤓',
        '🤲','👐','🙌','👏','🤝','👍','👎','👊','✊','🤛','🤜','🤞','✌️','🤟','🤘','👌','👈','👉','👆','👇','☝️','✋',
        '🤚','🖐','🖖','👋','🤙','💪','🖕','✍️','🙏',
        '🔴','🟠','🟡','🟢','🔵','🟣','⚫','⚪','🟤','🟥','🟧','🟨','🟩','🟦','🟪','⬛','⬜','🟫',
        '❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝',
        '✅','❌','❎','➕','➖','➗','❓','❔','❕','❗','⭕',
        '💼','📈','📉','📊','📋','📅','📆','📇','📁','📂','📃','📄','🧮','📎','🔗','✂️','🗑️','📌','📍',
        '📞','☎️','📠','📧','✉️','📩','📨','📬','📮','🏠','🏢','🏦','💰','🪙','💴','💵','💶','💷','💸','💳','🧾',
        '🚀','🔥','⭐','💡','🔔','💯'
    ];
    const emojiGrid = document.getElementById('emoji-grid');
    emojis.forEach(emoji => {
        const span = document.createElement('span');
        span.className = 'emoji-item';
        span.innerText = emoji;
        span.onmousedown = (e) => e.preventDefault();
        span.onclick = () => {
            insertEmoji(emoji);
            toggleMenu('emoji-menu'); 
        };
        emojiGrid.appendChild(span);
    });

    function toggleMenu(menuId) {
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
            if (menu.id !== menuId) menu.classList.remove('active');
        });
        document.getElementById(menuId).classList.toggle('active');
    }

    document.addEventListener('mousedown', function(event) {
        if (!event.target.closest('.dropdown-container')) {
            document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('active'));
        }
    });

    function execCmd(command, value = null) {
        if (document.activeElement !== editorEl) {
            editorEl.focus();
            restoreSelection();
        }
        document.execCommand("styleWithCSS", false, true); 
        document.execCommand(command, false, value);
        saveSelection();
        updatePreview();
    }

    function insertEmoji(emoji) {
        if (document.activeElement !== editorEl) {
            editorEl.focus();
            restoreSelection();
        }
        document.execCommand('insertText', false, emoji);
        saveSelection();
        updatePreview();
    }

    function insertContainer(type = 'blue') {
        if (document.activeElement !== editorEl) {
            editorEl.focus();
            restoreSelection();
        }
        
        toggleMenu('frame-menu');

        const sel = window.getSelection();
        let selectedText = "";

        // 1. Przechwycenie zaznaczonego tekstu i wyczyszczenie zaznaczenia z edytora
        if (sel.rangeCount > 0 && !sel.isCollapsed) {
            const range = sel.getRangeAt(0);
            const container = document.createElement("div");
            container.appendChild(range.cloneContents());
            selectedText = container.innerHTML;
            range.deleteContents(); 
        }

        // 2. INTELIGENTNE USUWANIE KROPKI (PUNKTORA):
        // Jeśli kursor został w pustym punkcie (LI), przenosimy go pod listę i kasujemy pusty element
        let range = sel.getRangeAt(0);
        let parentLi = null;
        let node = range.startContainer;
        while (node && node !== editorEl) {
            if (node.nodeType === Node.ELEMENT_NODE && node.tagName === 'LI') {
                parentLi = node;
                break;
            }
            node = node.parentNode;
        }

        if (parentLi) {
            let cleanHTML = parentLi.innerHTML.replace(/<br\s*\/?>/gi, '').trim();
            if (cleanHTML === "" && parentLi.parentNode) {
                let parentList = parentLi.parentNode;
                const newRange = document.createRange();
                newRange.setStartAfter(parentList);
                newRange.collapse(true);
                sel.removeAllRanges();
                sel.addRange(newRange);
                
                parentLi.remove();
                if (parentList.innerHTML.replace(/<br\s*\/?>/gi, '').trim() === "") {
                    parentList.remove();
                }
            }
        }

        // 3. Konfiguracja kolorów
        let borderColor, bgColor, textColor;
        if (type === 'blue') {
            borderColor = '#17a2b8'; bgColor = '#f0f7f9'; textColor = '#002d5a';
        } else if (type === 'green') {
            borderColor = '#28a745'; bgColor = '#f0f9f1'; textColor = '#155724';
        } else if (type === 'orange') {
            borderColor = '#fd7e14'; bgColor = '#fff6f0'; textColor = '#854007';
        }

        let finalContent = "";

        // Jeśli ramka jest pusta, wstawiamy czysty tekst pomocniczy bez nagłówków
        if (!selectedText || selectedText.trim() === "") {
            finalContent = `<em>Wpisz tekst...</em>`;
        } else {
            let temp = document.createElement('div');
            temp.innerHTML = selectedText;
            
            // Formatowanie pierwszej linijki na czarny pogrubiony nagłówek
            for (let i = 0; i < temp.childNodes.length; i++) {
                let n = temp.childNodes[i];
                
                if (n.nodeType === Node.TEXT_NODE && n.textContent.trim() !== '') {
                    let strong = document.createElement('strong');
                    strong.style.display = 'block';
                    strong.style.color = '#000000';
                    strong.style.marginBottom = '5px';
                    strong.style.fontSize = '15px';
                    strong.textContent = n.textContent;
                    temp.replaceChild(strong, n);
                    break;
                } else if (n.nodeType === Node.ELEMENT_NODE && !['BR', 'UL', 'OL', 'LI'].includes(n.tagName)) {
                    n.style.color = '#000000';
                    n.style.fontWeight = 'bold';
                    n.style.marginBottom = '5px';
                    if (['SPAN', 'B', 'STRONG', 'I', 'U'].includes(n.tagName)) {
                        n.style.display = 'block';
                    }
                    break;
                }
            }
            finalContent = temp.innerHTML;
        }

        // Czysta struktura tabeli z marginesami CSS zamiast <br> zapobiega powstawaniu artefaktów
        const containerHtml = `
            <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color: ${bgColor}; border-left: 4px solid ${borderColor}; border-radius: 0 6px 6px 0; margin-bottom: 15px; margin-top: 15px; display: table;">
                <tr>
                    <td style="padding: 15px 20px;">
                        <div style="margin: 0; font-family: 'Lato', Arial, sans-serif; color: ${textColor}; line-height: 1.5;">
                            ${finalContent}
                        </div>
                    </td>
                </tr>
            </table>
        `;
        
        document.execCommand('insertHTML', false, containerHtml);
        saveSelection();
        updatePreview();
    }

    function updatePreview() {
        const name = document.getElementById('input-name').value;
        const content = editorEl.innerHTML;
        const advisorData = document.getElementById('input-advisor').value.split('|');
        const showSig = document.getElementById('show-signature').checked;

        document.getElementById('view-name').textContent = name + (name.endsWith(',') ? '' : ',');
        document.getElementById('view-content').innerHTML = content;
        document.getElementById('view-link').href = advisorData[1];
        document.getElementById('view-signature-container').style.display = showSig ? 'block' : 'none';
    }

    function copyEmail() {
        const container = document.getElementById('copy-container');
        const btn = document.getElementById('copy-btn');
        
        const range = document.createRange();
        range.selectNode(container);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);

        try {
            const blob = new Blob([container.innerHTML], { type: 'text/html' });
            const item = new ClipboardItem({ 'text/html': blob });
            navigator.clipboard.write([item]).then(() => {
                btn.textContent = '✅ SKOPIOWANO!';
                btn.classList.add('success');
                setTimeout(() => {
                    btn.textContent = 'KOPIUJ TREŚĆ DO MAILA';
                    btn.classList.remove('success');
                }, 2000);
            });
        } catch (err) {
            document.execCommand('copy');
            btn.textContent = '✅ SKOPIOWANO!';
            btn.classList.add('success');
            setTimeout(() => {
                btn.textContent = 'KOPIUJ TREŚĆ DO MAILA';
                btn.classList.remove('success');
            }, 2000);
        }
        window.getSelection().removeAllRanges();
    }

    updatePreview();
</script>
